<!DOCTYPE html>
<html>
<head>
    <title>Forms</title>
</head>
<body>
    <form>
        <input type="text" required> <!--el input es para recibir datos, y el type es para poner de que forma  (este caso es una txtbox)-->
        <!--el required es para hacerlo obligatorio
        - si ponemos value, podemos cambiar el valor. es como poner un valor po defecto 
        - el atributo name identifica el input
        - el atributo placeholder sirve para poder poner datos que cuando el usuario comience a escribir desaparezcan, ej: "escribe tu nombre"
        -->
    </form>
</body>
</html>
