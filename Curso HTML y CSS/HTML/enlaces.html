<body>
    <a href="https://youtube.com/">YouTube</a> <!--Esto es para poner enlaces (a), lo que esta al lado de la a, es un atributo.
    si el enlace no esta en nuestro dispositivo, hay que agregar el "https://"-->
    <a href="listas.html" title="Ejemplo de listas">Listas</a><!--lo que hace el atributo title es que cuando posicionas el cursor por encima del enlace, 
    dice lo que pusite-->
    <a href="Parrafos_encabezados.html" target="_blank">Parrafos</a><!--Lo que hace el atributo target es definir como se abre el enlace, 
    por defecto se pone_self que es en el mimso lugra, 
    pero el _blank hace que se abra en otra pestana-->
    <a href="Imagenes.html" target="_blank">Imagenes</a> <!--Tambien en href se puede poner #algo, que so lo que hace es navegar dentro de la misma pagina a algun apartado-->
    <a href="youtube.com" rel="noopener" target="_blank"> YouTube</a> <!--no tiene acceso a win.opnener, es decir, que la gaina a la que redirigimos no pueda cambia la de origen-->
    <a href="youtube.com" rel="noreferrer" target="_blank">yt</a><!--es lo mismo que noopener, pero ademas renstrige la nformacion de los encabezados, es decir, no se seabe de que pagina vino-->
    <a href="youtube.com" rel="nofollow"></a> <!--Esto le dce a googlr que no siga lo qu eva visitando el usuario, que se desligue de el-->
